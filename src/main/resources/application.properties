spring.application.name=Dynamic-Config-Demo

server.port=8080

# 운영 환경 DB 설정 (로컬 실행 시 사용)
# 테스트 실행 시에는 @DynamicPropertySource가 아래 설정을 모두 덮어씀
spring.datasource.url=jdbc:mysql://localhost:3306/fuzzdb
spring.datasource.username=fuzz
spring.datasource.password=fuzz
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false