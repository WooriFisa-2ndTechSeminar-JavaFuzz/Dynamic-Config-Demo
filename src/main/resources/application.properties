spring.application.name=Dynamic-Config-Demo

# jenkins와 포트 충돌 방지 위해 8081로 변경
server.port=8081

# 운영 환경 DB 설정 (로컬 실행 시 사용)
# 테스트 실행 시에는 @DynamicPropertySource가 아래 설정을 모두 덮어쓰고 testcontainers에서 제공하는 MySQL 컨테이너의 설정을 사용함
spring.datasource.url=jdbc:mysql://localhost:3306/fuzzdb
spring.datasource.username=fuzz
spring.datasource.password=fuzz
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false